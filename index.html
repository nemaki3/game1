<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clickergame1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      color: #eaeaea;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
      color: #e94560;
      letter-spacing: 2px;
    }

    #score {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: #a8dadc;
    }

    #click-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle, #e94560, #c0392b);
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
    }

    #click-btn:active {
      transform: scale(0.93);
      box-shadow: 0 0 8px rgba(233, 69, 96, 0.3);
    }

    #per-click {
      margin-top: 1.5rem;
      font-size: 0.95rem;
      color: #888;
    }

    /* アップグレードエリア */
    #upgrade-area {
      margin-top: 2.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      width: 320px;
    }

    .upgrade-btn {
      padding: 0.75rem 1rem;
      border: 1px solid #444;
      border-radius: 8px;
      background-color: #16213e;
      color: #eaeaea;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.2s;
    }

    .upgrade-btn:hover:not(:disabled) {
      background-color: #0f3460;
    }

    .upgrade-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .upgrade-name {
      font-size: 0.95rem;
    }

    .upgrade-cost {
      font-size: 0.85rem;
      color: #f0a500;
    }
  </style>
</head>
<body>

  <h1>clickergame1</h1>
  <div id="score">スコア: 0</div>

  <button id="click-btn">クリック!</button>
  <div id="per-click">1クリック = 1点</div>

  <div id="upgrade-area">
    <button class="upgrade-btn" id="upgrade-1" data-cost="10" data-power="1">
      <span class="upgrade-name">クリック強化 Lv.1</span>
      <span class="upgrade-cost">10点</span>
    </button>
    <button class="upgrade-btn" id="upgrade-2" data-cost="50" data-power="5">
      <span class="upgrade-name">クリック強化 Lv.2</span>
      <span class="upgrade-cost">50点</span>
    </button>
    <button class="upgrade-btn" id="upgrade-3" data-cost="200" data-power="20">
      <span class="upgrade-name">クリック強化 Lv.3</span>
      <span class="upgrade-cost">200点</span>
    </button>
  </div>

  <script>
    // スコアとクリック倍率
    let score = 0;
    let clickPower = 1;

    const scoreEl = document.getElementById('score');
    const clickBtn = document.getElementById('click-btn');
    const perClickEl = document.getElementById('per-click');

    // クリックでスコア加算
    clickBtn.addEventListener('click', () => {
      score += clickPower;
      updateScore();
      updateUpgradeButtons();
    });

    // スコア表示更新
    function updateScore() {
      scoreEl.textContent = `スコア: ${score}`;
    }

    // アップグレードボタンの有効/無効を更新
    function updateUpgradeButtons() {
      document.querySelectorAll('.upgrade-btn').forEach(btn => {
        const cost = parseInt(btn.dataset.cost);
        btn.disabled = score < cost;
      });
    }

    // アップグレード購入処理
    document.querySelectorAll('.upgrade-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const cost = parseInt(btn.dataset.cost);
        const power = parseInt(btn.dataset.power);

        if (score >= cost) {
          score -= cost;
          clickPower += power;
          btn.disabled = true;
          btn.style.opacity = '0.3';
          btn.querySelector('.upgrade-name').textContent += ' (購入済み)';
          perClickEl.textContent = `1クリック = ${clickPower}点`;
          updateScore();
          updateUpgradeButtons();
        }
      });
    });

    // 初期状態でボタンの有効/無効を設定
    updateUpgradeButtons();
  </script>

</body>
</html>
