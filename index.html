<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clickergame1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      color: #eaeaea;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      min-height: 100vh;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: #e94560;
      letter-spacing: 2px;
    }

    /* スコア・CPS 表示 */
    #score {
      font-size: 1.5rem;
      color: #a8dadc;
    }

    #cps-display {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 1.5rem;
    }

    /* クリックボタン */
    #click-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle, #e94560, #c0392b);
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
      transition: transform 0.1s, box-shadow 0.1s;
      user-select: none;
      position: relative;
    }

    #click-btn:active {
      transform: scale(0.93);
      box-shadow: 0 0 8px rgba(233, 69, 96, 0.3);
    }

    #per-click {
      margin-top: 0.8rem;
      font-size: 0.95rem;
      color: #888;
    }

    /* クリックエフェクト（+N テキスト） */
    .click-effect {
      position: fixed;
      font-size: 1.2rem;
      font-weight: bold;
      color: #f0a500;
      pointer-events: none;
      animation: floatUp 0.8s ease-out forwards;
      z-index: 100;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }

    /* アップグレード・生産者 2カラムレイアウト */
    #bottom-area {
      margin-top: 2rem;
      display: flex;
      gap: 1.5rem;
      width: 100%;
      max-width: 680px;
      align-items: flex-start;
    }

    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .panel-title {
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.2rem;
      border-bottom: 1px solid #333;
      padding-bottom: 0.4rem;
    }

    /* 共通ボタンスタイル */
    .shop-btn {
      padding: 0.7rem 0.8rem;
      border: 1px solid #444;
      border-radius: 8px;
      background-color: #16213e;
      color: #eaeaea;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.2s;
      width: 100%;
      text-align: left;
    }

    .shop-btn:hover:not(:disabled) {
      background-color: #0f3460;
    }

    .shop-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-left {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .btn-name {
      font-size: 0.9rem;
    }

    .btn-desc {
      font-size: 0.75rem;
      color: #888;
    }

    .btn-cost {
      font-size: 0.85rem;
      color: #f0a500;
      white-space: nowrap;
      margin-left: 0.5rem;
    }

    /* 生産者の個数バッジ */
    .btn-count {
      background-color: #0f3460;
      border-radius: 4px;
      padding: 0.15rem 0.45rem;
      font-size: 0.8rem;
      color: #a8dadc;
      margin-left: 0.4rem;
      white-space: nowrap;
    }

    /* セーブ・リセットボタン */
    #save-area {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
    }

    .util-btn {
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: 1px solid #444;
      background-color: #16213e;
      color: #888;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background-color 0.2s;
    }

    .util-btn:hover {
      background-color: #0f3460;
      color: #eaeaea;
    }

    #save-notice {
      font-size: 0.75rem;
      color: #555;
      margin-top: 0.4rem;
    }

    /* 実績トースト通知 */
    #achievement-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: linear-gradient(135deg, #0f3460, #16213e);
      border: 1px solid #f0a500;
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 0 20px rgba(240, 165, 0, 0.3);
      z-index: 200;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      max-width: 280px;
    }

    #achievement-toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .toast-body {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }

    .toast-label {
      font-size: 0.7rem;
      color: #f0a500;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .toast-name {
      font-size: 0.95rem;
      font-weight: bold;
      color: #eaeaea;
    }

    .toast-desc {
      font-size: 0.75rem;
      color: #888;
    }

    /* 実績一覧パネル */
    #achievement-panel {
      margin-top: 2rem;
      width: 100%;
      max-width: 680px;
    }

    #achievement-panel .panel-title {
      font-size: 0.85rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #333;
      padding-bottom: 0.4rem;
      margin-bottom: 0.6rem;
    }

    #achievement-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .achievement-badge {
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      border: 1px solid #333;
      background-color: #16213e;
      color: #555;
    }

    .achievement-badge.unlocked {
      border-color: #f0a500;
      color: #f0a500;
      background-color: #1e2d50;
    }
  </style>
</head>
<body>

  <h1>clickergame1</h1>
  <div id="score">スコア: 0</div>
  <div id="cps-display">毎秒 +0.0点</div>

  <button id="click-btn">クリック!</button>
  <div id="per-click">1クリック = 1点</div>

  <div id="bottom-area">
    <!-- アップグレードパネル -->
    <div class="panel" id="upgrade-panel">
      <div class="panel-title">アップグレード</div>
      <!-- JS で生成 -->
    </div>

    <!-- 生産者パネル -->
    <div class="panel" id="producer-panel">
      <div class="panel-title">生産者</div>
      <!-- JS で生成 -->
    </div>
  </div>

  <!-- 実績一覧 -->
  <div id="achievement-panel">
    <div class="panel-title">実績</div>
    <div id="achievement-list"></div>
  </div>

  <div id="save-area">
    <button class="util-btn" id="save-btn">セーブ</button>
    <button class="util-btn" id="reset-btn">リセット</button>
  </div>
  <div id="save-notice"></div>

  <!-- 実績トースト通知 -->
  <div id="achievement-toast">
    <div class="toast-icon" id="toast-icon"></div>
    <div class="toast-body">
      <span class="toast-label">実績解除！</span>
      <span class="toast-name" id="toast-name"></span>
      <span class="toast-desc" id="toast-desc"></span>
    </div>
  </div>

  <script>
    // ============================================================
    // ゲーム状態
    // ============================================================
    let score = 0;
    let clickPower = 1;
    let totalClicks = 0;    // 累計クリック数
    let totalProducers = 0; // 累計生産者購入数

    // アップグレード定義
    const UPGRADES = [
      { id: 'u1', name: 'クリック強化 Lv.1', cost: 10,   power: 1  },
      { id: 'u2', name: 'クリック強化 Lv.2', cost: 50,   power: 5  },
      { id: 'u3', name: 'クリック強化 Lv.3', cost: 200,  power: 20 },
      { id: 'u4', name: 'クリック強化 Lv.4', cost: 1000, power: 100 },
    ];

    // 購入済みアップグレード管理
    const upgradePurchased = {};

    // 生産者定義（自動クリック）
    const PRODUCERS = [
      { id: 'p1', name: '見習いクリッカー', desc: '手動で頑張る見習い',   baseCost: 15,   baseCps: 0.1  },
      { id: 'p2', name: 'オートクリッカー', desc: '自動でクリックする機械', baseCost: 100,  baseCps: 0.5  },
      { id: 'p3', name: 'クリックロボット', desc: '高性能クリックロボット', baseCost: 500,  baseCps: 2    },
      { id: 'p4', name: 'クリック工場',     desc: '大量生産クリック工場',  baseCost: 2000, baseCps: 10   },
    ];

    // 生産者の個数
    const producerCount = {};
    PRODUCERS.forEach(p => { producerCount[p.id] = 0; });

    // ============================================================
    // 実績定義
    // ============================================================
    const ACHIEVEMENTS = [
      { id: 'a_first_click',    icon: '👆', name: '初クリック',       desc: '初めてクリックした',           check: () => totalClicks >= 1 },
      { id: 'a_click_100',      icon: '🖱️', name: '100クリック',      desc: '合計100回クリックした',        check: () => totalClicks >= 100 },
      { id: 'a_click_1000',     icon: '⚡', name: '1000クリック',     desc: '合計1000回クリックした',       check: () => totalClicks >= 1000 },
      { id: 'a_score_100',      icon: '💯', name: '100点突破',        desc: 'スコアが100点を超えた',        check: () => score >= 100 },
      { id: 'a_score_1000',     icon: '🌟', name: '1000点突破',       desc: 'スコアが1000点を超えた',       check: () => score >= 1000 },
      { id: 'a_score_10000',    icon: '🚀', name: '1万点突破',        desc: 'スコアが1万点を超えた',        check: () => score >= 10000 },
      { id: 'a_score_100000',   icon: '👑', name: '10万点突破',       desc: 'スコアが10万点を超えた',       check: () => score >= 100000 },
      { id: 'a_first_upgrade',  icon: '⬆️', name: '強化の第一歩',     desc: '初めてアップグレードを購入した', check: () => Object.values(upgradePurchased).some(v => v) },
      { id: 'a_all_upgrades',   icon: '💎', name: '完全強化',         desc: '全アップグレードを購入した',   check: () => UPGRADES.every(u => upgradePurchased[u.id]) },
      { id: 'a_first_producer', icon: '🤖', name: '自動化の始まり',   desc: '初めて生産者を購入した',       check: () => totalProducers >= 1 },
      { id: 'a_producer_10',    icon: '🏭', name: '生産者10台',       desc: '生産者を合計10台購入した',     check: () => totalProducers >= 10 },
      { id: 'a_producer_50',    icon: '🌆', name: '生産者50台',       desc: '生産者を合計50台購入した',     check: () => totalProducers >= 50 },
      { id: 'a_cps_10',         icon: '⏱️', name: '秒速10点',         desc: '毎秒10点以上を生産している',   check: () => calcCps() >= 10 },
      { id: 'a_cps_100',        icon: '💨', name: '秒速100点',        desc: '毎秒100点以上を生産している',  check: () => calcCps() >= 100 },
    ];

    // 解除済み実績
    const achievementUnlocked = {};

    // トーストキュー（重なり防止）
    let toastQueue = [];
    let toastShowing = false;

    // ============================================================
    // 計算ヘルパー
    // ============================================================

    // 生産者の現在のコスト（購入するたびに 1.15 倍）
    function getProducerCost(producer) {
      return Math.floor(producer.baseCost * Math.pow(1.15, producerCount[producer.id]));
    }

    // 毎秒の合計生産量（CPS）
    function calcCps() {
      return PRODUCERS.reduce((sum, p) => sum + p.baseCps * producerCount[p.id], 0);
    }

    // ============================================================
    // 画面更新
    // ============================================================

    function updateScore() {
      document.getElementById('score').textContent = `スコア: ${Math.floor(score)}`;
    }

    function updateCpsDisplay() {
      const cps = calcCps();
      document.getElementById('cps-display').textContent = `毎秒 +${cps.toFixed(1)}点`;
    }

    function updateAllButtons() {
      // アップグレードボタン
      UPGRADES.forEach(u => {
        const btn = document.getElementById('btn-' + u.id);
        if (!btn) return;
        btn.disabled = upgradePurchased[u.id] || score < u.cost;
      });

      // 生産者ボタン
      PRODUCERS.forEach(p => {
        const btn = document.getElementById('btn-' + p.id);
        if (!btn) return;
        const cost = getProducerCost(p);
        btn.disabled = score < cost;
        // コスト表示を更新
        btn.querySelector('.btn-cost').textContent = `${cost}点`;
        // 個数表示を更新
        btn.querySelector('.btn-count').textContent = `×${producerCount[p.id]}`;
      });
    }

    // ============================================================
    // 実績システム
    // ============================================================

    // 実績バッジ一覧を描画
    function buildAchievementList() {
      const list = document.getElementById('achievement-list');
      list.innerHTML = '';
      ACHIEVEMENTS.forEach(a => {
        const badge = document.createElement('div');
        badge.className = 'achievement-badge' + (achievementUnlocked[a.id] ? ' unlocked' : '');
        badge.id = 'badge-' + a.id;
        badge.title = a.desc;
        badge.textContent = `${a.icon} ${a.name}`;
        list.appendChild(badge);
      });
    }

    // 実績チェック（毎回呼ぶ）
    function checkAchievements() {
      ACHIEVEMENTS.forEach(a => {
        if (achievementUnlocked[a.id]) return;
        if (a.check()) {
          achievementUnlocked[a.id] = true;
          // バッジを解除済みに更新
          const badge = document.getElementById('badge-' + a.id);
          if (badge) badge.className = 'achievement-badge unlocked';
          // トースト通知をキューに追加
          toastQueue.push(a);
          showNextToast();
          autoSave();
        }
      });
    }

    // トースト表示（キューを順番に処理）
    function showNextToast() {
      if (toastShowing || toastQueue.length === 0) return;
      const a = toastQueue.shift();
      toastShowing = true;

      const toast = document.getElementById('achievement-toast');
      document.getElementById('toast-icon').textContent = a.icon;
      document.getElementById('toast-name').textContent = a.name;
      document.getElementById('toast-desc').textContent = a.desc;

      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => {
          toastShowing = false;
          showNextToast();
        }, 350);
      }, 3000);
    }

    // ============================================================
    // UI 生成
    // ============================================================

    function buildUpgradePanel() {
      const panel = document.getElementById('upgrade-panel');
      UPGRADES.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'shop-btn';
        btn.id = 'btn-' + u.id;
        btn.innerHTML = `
          <div class="btn-left">
            <span class="btn-name">${u.name}</span>
            <span class="btn-desc">クリック +${u.power}点</span>
          </div>
          <span class="btn-cost">${u.cost}点</span>
        `;
        btn.addEventListener('click', () => buyUpgrade(u));
        panel.appendChild(btn);
      });
    }

    function buildProducerPanel() {
      const panel = document.getElementById('producer-panel');
      PRODUCERS.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'shop-btn';
        btn.id = 'btn-' + p.id;
        btn.innerHTML = `
          <div class="btn-left">
            <span class="btn-name">${p.name}</span>
            <span class="btn-desc">${p.desc}（+${p.baseCps}/秒）</span>
          </div>
          <span class="btn-cost">${p.baseCost}点</span>
          <span class="btn-count">×0</span>
        `;
        btn.addEventListener('click', () => buyProducer(p));
        panel.appendChild(btn);
      });
    }

    // ============================================================
    // 購入処理
    // ============================================================

    function buyUpgrade(u) {
      if (upgradePurchased[u.id] || score < u.cost) return;
      score -= u.cost;
      clickPower += u.power;
      upgradePurchased[u.id] = true;

      // ボタンを購入済み表示に変更
      const btn = document.getElementById('btn-' + u.id);
      btn.querySelector('.btn-name').textContent += ' ✓';
      btn.disabled = true;

      document.getElementById('per-click').textContent = `1クリック = ${clickPower}点`;
      updateScore();
      updateAllButtons();
      checkAchievements();
      autoSave();
    }

    function buyProducer(p) {
      const cost = getProducerCost(p);
      if (score < cost) return;
      score -= cost;
      producerCount[p.id]++;
      totalProducers++;
      updateScore();
      updateCpsDisplay();
      updateAllButtons();
      checkAchievements();
      autoSave();
    }

    // ============================================================
    // クリック処理
    // ============================================================

    document.getElementById('click-btn').addEventListener('click', (e) => {
      score += clickPower;
      totalClicks++;
      updateScore();
      updateAllButtons();
      checkAchievements();
      spawnClickEffect(e.clientX, e.clientY, clickPower);
      autoSave();
    });

    // クリックエフェクト（+N が飛び出す）
    function spawnClickEffect(x, y, value) {
      const el = document.createElement('div');
      el.className = 'click-effect';
      el.textContent = `+${value}`;
      el.style.left = `${x - 10}px`;
      el.style.top  = `${y - 10}px`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // ============================================================
    // 自動生産（50ms ごと）
    // ============================================================

    setInterval(() => {
      const cps = calcCps();
      if (cps === 0) return;
      score += cps / 20; // 1000ms / 50ms = 20
      updateScore();
      updateAllButtons();
    }, 50);

    // ============================================================
    // セーブ / ロード / リセット
    // ============================================================

    const SAVE_KEY = 'clickergame1_save';

    function saveGame(showNotice = true) {
      const data = {
        score,
        clickPower,
        totalClicks,
        totalProducers,
        upgradePurchased:    { ...upgradePurchased },
        producerCount:       { ...producerCount },
        achievementUnlocked: { ...achievementUnlocked },
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      if (showNotice) {
        const el = document.getElementById('save-notice');
        el.textContent = `セーブしました（${new Date().toLocaleTimeString('ja-JP')}）`;
        setTimeout(() => { el.textContent = ''; }, 3000);
      }
    }

    function loadGame() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;

      const data = JSON.parse(raw);
      score          = data.score          ?? 0;
      clickPower     = data.clickPower     ?? 1;
      totalClicks    = data.totalClicks    ?? 0;
      totalProducers = data.totalProducers ?? 0;

      // アップグレード復元
      if (data.upgradePurchased) {
        Object.assign(upgradePurchased, data.upgradePurchased);
        UPGRADES.forEach(u => {
          if (upgradePurchased[u.id]) {
            const btn = document.getElementById('btn-' + u.id);
            if (btn) {
              btn.querySelector('.btn-name').textContent += ' ✓';
              btn.disabled = true;
            }
          }
        });
      }

      // 生産者復元
      if (data.producerCount) {
        Object.assign(producerCount, data.producerCount);
      }

      // 実績復元（通知なしで復元）
      if (data.achievementUnlocked) {
        Object.assign(achievementUnlocked, data.achievementUnlocked);
      }

      document.getElementById('per-click').textContent = `1クリック = ${clickPower}点`;
      updateScore();
      updateCpsDisplay();
      updateAllButtons();
    }

    // 30秒ごとに自動セーブ
    function autoSave() { saveGame(false); }
    setInterval(() => saveGame(false), 30000);

    document.getElementById('save-btn').addEventListener('click', () => saveGame(true));

    document.getElementById('reset-btn').addEventListener('click', () => {
      if (!confirm('セーブデータを削除してリセットしますか？')) return;
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    });

    // ============================================================
    // 初期化
    // ============================================================

    buildUpgradePanel();
    buildProducerPanel();
    loadGame();
    buildAchievementList(); // ロード後に実績バッジを描画（解除済み状態を反映）
    updateCpsDisplay();
    updateAllButtons();
  </script>

</body>
</html>
