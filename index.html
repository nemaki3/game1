<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>clickergame1</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0d0d1a;
      color: #eaeaea;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== ヘッダー ===== */
    header {
      background: linear-gradient(90deg, #0f3460, #1a1a2e);
      border-bottom: 2px solid #e94560;
      padding: 0.6rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    header h1 {
      font-size: 1.3rem;
      color: #e94560;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    #header-score {
      font-size: 1.5rem;
      font-weight: bold;
      color: #f0e040;
      text-shadow: 0 0 12px rgba(240, 224, 64, 0.6);
      white-space: nowrap;
    }

    #header-cps {
      font-size: 0.85rem;
      color: #a8dadc;
      white-space: nowrap;
    }

    /* ===== メインレイアウト（3カラム） ===== */
    #main-layout {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
    }

    /* ===== 左パネル（アップグレード） ===== */
    #left-panel {
      width: 240px;
      min-width: 200px;
      background-color: #12122a;
      border-right: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* ===== 中央パネル ===== */
    #center-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2rem 1rem 1.5rem;
      gap: 1rem;
      overflow-y: auto;
    }

    /* ===== 右パネル（生産者） ===== */
    #right-panel {
      width: 260px;
      min-width: 200px;
      background-color: #12122a;
      border-left: 1px solid #2a2a4a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* ===== パネルタイトル ===== */
    .panel-header {
      padding: 0.7rem 1rem;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #666;
      border-bottom: 1px solid #2a2a4a;
      background-color: #0f0f22;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    /* ===== 左右パネル共通ボタン ===== */
    .shop-btn {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: none;
      border-bottom: 1px solid #1a1a35;
      background-color: transparent;
      color: #eaeaea;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      transition: background-color 0.15s;
      text-align: left;
    }

    .shop-btn:hover:not(:disabled) {
      background-color: #1a2a4a;
    }

    .shop-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .shop-btn .btn-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      width: 2rem;
      text-align: center;
    }

    .shop-btn .btn-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
      min-width: 0;
    }

    .btn-name {
      font-size: 0.85rem;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn-desc {
      font-size: 0.7rem;
      color: #777;
    }

    .btn-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.15rem;
      flex-shrink: 0;
    }

    .btn-cost {
      font-size: 0.8rem;
      color: #f0e040;
      white-space: nowrap;
    }

    .btn-count {
      font-size: 0.75rem;
      background-color: #0f3460;
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      color: #a8dadc;
      white-space: nowrap;
    }

    /* 購入済みアップグレード */
    .shop-btn.purchased {
      opacity: 0.5;
      background-color: #0a1a10;
    }

    /* ===== 中央: クリックボタン ===== */
    #click-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
    }

    #click-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 3px solid rgba(233, 69, 96, 0.4);
      background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b 60%, #7b1a1a);
      color: white;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow:
        0 0 30px rgba(233, 69, 96, 0.4),
        0 0 60px rgba(233, 69, 96, 0.15),
        inset 0 -4px 8px rgba(0,0,0,0.3);
      transition: transform 0.08s, box-shadow 0.08s;
      user-select: none;
      position: relative;
    }

    #click-btn:hover {
      box-shadow:
        0 0 40px rgba(233, 69, 96, 0.6),
        0 0 80px rgba(233, 69, 96, 0.25),
        inset 0 -4px 8px rgba(0,0,0,0.3);
      transform: scale(1.03);
    }

    #click-btn:active {
      transform: scale(0.92);
      box-shadow:
        0 0 10px rgba(233, 69, 96, 0.3),
        inset 0 -2px 4px rgba(0,0,0,0.3);
    }

    #per-click {
      font-size: 0.85rem;
      color: #777;
    }

    /* ===== クリックエフェクト ===== */
    .click-effect {
      position: fixed;
      font-size: 1.3rem;
      font-weight: bold;
      color: #f0e040;
      text-shadow: 0 0 8px rgba(240, 224, 64, 0.8);
      pointer-events: none;
      animation: floatUp 0.9s ease-out forwards;
      z-index: 300;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      50%  { opacity: 1; transform: translateY(-30px) scale(1.1); }
      100% { opacity: 0; transform: translateY(-70px) scale(0.9); }
    }

    /* ===== 中央: セーブ・統計エリア ===== */
    #stats-area {
      background-color: #12122a;
      border: 1px solid #2a2a4a;
      border-radius: 10px;
      padding: 0.8rem 1.2rem;
      width: 100%;
      max-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #777;
    }

    .stat-row span:last-child {
      color: #a8dadc;
    }

    /* ===== セーブ・リセットボタン ===== */
    #save-area {
      display: flex;
      gap: 0.8rem;
    }

    .util-btn {
      padding: 0.4rem 1rem;
      border-radius: 6px;
      border: 1px solid #333;
      background-color: #16213e;
      color: #777;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background-color 0.2s, color 0.2s;
    }

    .util-btn:hover {
      background-color: #0f3460;
      color: #eaeaea;
    }

    #save-notice {
      font-size: 0.75rem;
      color: #555;
      height: 1rem;
      text-align: center;
    }

    /* ===== 実績エリア（中央下部） ===== */
    #achievement-area {
      width: 100%;
      max-width: 360px;
    }

    #achievement-area .panel-title {
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #555;
      border-bottom: 1px solid #2a2a4a;
      padding-bottom: 0.4rem;
      margin-bottom: 0.6rem;
    }

    #achievement-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .achievement-badge {
      padding: 0.3rem 0.65rem;
      border-radius: 20px;
      font-size: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      border: 1px solid #2a2a4a;
      background-color: #12122a;
      color: #3a3a5a;
      transition: all 0.3s;
    }

    .achievement-badge.unlocked {
      border-color: #f0a500;
      color: #f0a500;
      background-color: #1e1e10;
      box-shadow: 0 0 6px rgba(240, 165, 0, 0.2);
    }

    /* ===== 実績トースト ===== */
    #achievement-toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: linear-gradient(135deg, #1a2040, #0f1a30);
      border: 1px solid #f0a500;
      border-radius: 12px;
      padding: 0.85rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      box-shadow: 0 0 25px rgba(240, 165, 0, 0.3);
      z-index: 500;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      max-width: 280px;
    }

    #achievement-toast.show {
      opacity: 1;
      transform: translateX(0);
    }

    .toast-icon {
      font-size: 1.6rem;
      flex-shrink: 0;
    }

    .toast-body {
      display: flex;
      flex-direction: column;
      gap: 0.12rem;
    }

    .toast-label {
      font-size: 0.65rem;
      color: #f0a500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    .toast-name {
      font-size: 0.95rem;
      font-weight: bold;
      color: #eaeaea;
    }

    .toast-desc {
      font-size: 0.72rem;
      color: #888;
    }
  </style>
</head>
<body>

  <!-- ===== ヘッダー ===== -->
  <header>
    <h1>💰 clickergame1</h1>
    <div id="header-score">$0</div>
    <div id="header-cps">毎秒 +$0.0</div>
  </header>

  <!-- ===== メインレイアウト ===== -->
  <div id="main-layout">

    <!-- 左パネル: アップグレード -->
    <div id="left-panel">
      <div class="panel-header">💡 アップグレード</div>
      <!-- JS で生成 -->
    </div>

    <!-- 中央パネル -->
    <div id="center-panel">

      <!-- クリックボタン -->
      <div id="click-area">
        <button id="click-btn">💵</button>
        <div id="per-click">1クリック = $1</div>
      </div>

      <!-- 統計情報 -->
      <div id="stats-area">
        <div class="stat-row">
          <span>総クリック数</span>
          <span id="stat-clicks">0回</span>
        </div>
        <div class="stat-row">
          <span>購入した生産者</span>
          <span id="stat-producers">0台</span>
        </div>
        <div class="stat-row">
          <span>解除した実績</span>
          <span id="stat-achievements">0 / 14</span>
        </div>
      </div>

      <!-- セーブボタン -->
      <div id="save-area">
        <button class="util-btn" id="save-btn">セーブ</button>
        <button class="util-btn" id="reset-btn">リセット</button>
      </div>
      <div id="save-notice"></div>

      <!-- 実績一覧 -->
      <div id="achievement-area">
        <div class="panel-title">🏆 実績</div>
        <div id="achievement-list"></div>
      </div>

    </div>

    <!-- 右パネル: 生産者 -->
    <div id="right-panel">
      <div class="panel-header">🏭 生産者</div>
      <!-- JS で生成 -->
    </div>

  </div>

  <!-- 実績トースト通知 -->
  <div id="achievement-toast">
    <div class="toast-icon" id="toast-icon"></div>
    <div class="toast-body">
      <span class="toast-label">実績解除！</span>
      <span class="toast-name" id="toast-name"></span>
      <span class="toast-desc" id="toast-desc"></span>
    </div>
  </div>

  <script>
    // ============================================================
    // ゲーム状態
    // ============================================================
    let score = 0;
    let clickPower = 1;
    let totalClicks = 0;    // 累計クリック数
    let totalProducers = 0; // 累計生産者購入数

    // アップグレード定義
    const UPGRADES = [
      { id: 'u1', icon: '⚡', name: 'クリック強化 Lv.1', cost: 10,   power: 1   },
      { id: 'u2', icon: '🔥', name: 'クリック強化 Lv.2', cost: 50,   power: 5   },
      { id: 'u3', icon: '💥', name: 'クリック強化 Lv.3', cost: 200,  power: 20  },
      { id: 'u4', icon: '🌟', name: 'クリック強化 Lv.4', cost: 1000, power: 100 },
    ];

    // 購入済みアップグレード管理
    const upgradePurchased = {};

    // 生産者定義（自動収入）
    const PRODUCERS = [
      { id: 'p1', icon: '👶', name: '見習いクリッカー', desc: '手動で頑張る見習い',    baseCost: 15,   baseCps: 0.1  },
      { id: 'p2', icon: '🤖', name: 'オートクリッカー', desc: '自動でクリックする機械', baseCost: 100,  baseCps: 0.5  },
      { id: 'p3', icon: '🦾', name: 'クリックロボット', desc: '高性能クリックロボット', baseCost: 500,  baseCps: 2    },
      { id: 'p4', icon: '🏭', name: 'クリック工場',     desc: '大量生産クリック工場',   baseCost: 2000, baseCps: 10   },
    ];

    // 生産者の個数
    const producerCount = {};
    PRODUCERS.forEach(p => { producerCount[p.id] = 0; });

    // ============================================================
    // 実績定義
    // ============================================================
    const ACHIEVEMENTS = [
      { id: 'a_first_click',    icon: '👆', name: '初クリック',     desc: '初めてクリックした',              check: () => totalClicks >= 1 },
      { id: 'a_click_100',      icon: '🖱️', name: '100クリック',    desc: '合計100回クリックした',           check: () => totalClicks >= 100 },
      { id: 'a_click_1000',     icon: '⚡', name: '1000クリック',   desc: '合計1000回クリックした',          check: () => totalClicks >= 1000 },
      { id: 'a_score_100',      icon: '💰', name: '$100突破',       desc: '残高が$100を超えた',              check: () => score >= 100 },
      { id: 'a_score_1000',     icon: '🌟', name: '$1,000突破',     desc: '残高が$1,000を超えた',            check: () => score >= 1000 },
      { id: 'a_score_10000',    icon: '🚀', name: '$10,000突破',    desc: '残高が$10,000を超えた',           check: () => score >= 10000 },
      { id: 'a_score_100000',   icon: '👑', name: '$100,000突破',   desc: '残高が$100,000を超えた',          check: () => score >= 100000 },
      { id: 'a_first_upgrade',  icon: '⬆️', name: '強化の第一歩',   desc: '初めてアップグレードを購入した',   check: () => Object.values(upgradePurchased).some(v => v) },
      { id: 'a_all_upgrades',   icon: '💎', name: '完全強化',       desc: '全アップグレードを購入した',      check: () => UPGRADES.every(u => upgradePurchased[u.id]) },
      { id: 'a_first_producer', icon: '🤖', name: '自動化の始まり', desc: '初めて生産者を購入した',          check: () => totalProducers >= 1 },
      { id: 'a_producer_10',    icon: '🏭', name: '生産者10台',     desc: '生産者を合計10台購入した',        check: () => totalProducers >= 10 },
      { id: 'a_producer_50',    icon: '🌆', name: '生産者50台',     desc: '生産者を合計50台購入した',        check: () => totalProducers >= 50 },
      { id: 'a_cps_10',         icon: '⏱️', name: '毎秒$10',        desc: '毎秒$10以上を稼いでいる',         check: () => calcCps() >= 10 },
      { id: 'a_cps_100',        icon: '💨', name: '毎秒$100',       desc: '毎秒$100以上を稼いでいる',        check: () => calcCps() >= 100 },
    ];

    // 解除済み実績
    const achievementUnlocked = {};

    // トーストキュー（重なり防止）
    let toastQueue = [];
    let toastShowing = false;

    // ============================================================
    // 計算ヘルパー
    // ============================================================

    // 生産者の現在のコスト（購入するたびに 1.15 倍）
    function getProducerCost(producer) {
      return Math.floor(producer.baseCost * Math.pow(1.15, producerCount[producer.id]));
    }

    // 毎秒の合計生産量（CPS）
    function calcCps() {
      return PRODUCERS.reduce((sum, p) => sum + p.baseCps * producerCount[p.id], 0);
    }

    // 数値を読みやすいドル表示に変換（カンマ区切り）
    function formatMoney(value) {
      const n = Math.floor(value);
      if (n >= 1_000_000_000) return `$${(n / 1_000_000_000).toFixed(2)}B`;
      if (n >= 1_000_000)     return `$${(n / 1_000_000).toFixed(2)}M`;
      if (n >= 10_000)        return `$${n.toLocaleString('en-US')}`;
      return `$${n.toLocaleString('en-US')}`;
    }

    // ============================================================
    // 画面更新
    // ============================================================

    function updateScore() {
      document.getElementById('header-score').textContent = formatMoney(score);
    }

    function updateCpsDisplay() {
      const cps = calcCps();
      document.getElementById('header-cps').textContent = `毎秒 +$${cps.toFixed(1)}`;
    }

    function updateStats() {
      document.getElementById('stat-clicks').textContent = `${totalClicks.toLocaleString('en-US')}回`;
      document.getElementById('stat-producers').textContent = `${totalProducers}台`;
      const unlocked = Object.values(achievementUnlocked).filter(Boolean).length;
      document.getElementById('stat-achievements').textContent = `${unlocked} / ${ACHIEVEMENTS.length}`;
    }

    function updateAllButtons() {
      // アップグレードボタン
      UPGRADES.forEach(u => {
        const btn = document.getElementById('btn-' + u.id);
        if (!btn) return;
        if (!upgradePurchased[u.id]) {
          btn.disabled = score < u.cost;
        }
      });

      // 生産者ボタン
      PRODUCERS.forEach(p => {
        const btn = document.getElementById('btn-' + p.id);
        if (!btn) return;
        const cost = getProducerCost(p);
        btn.disabled = score < cost;
        btn.querySelector('.btn-cost').textContent = formatMoney(cost);
        btn.querySelector('.btn-count').textContent = `×${producerCount[p.id]}`;
      });
    }

    // ============================================================
    // 実績システム
    // ============================================================

    // 実績バッジ一覧を描画
    function buildAchievementList() {
      const list = document.getElementById('achievement-list');
      list.innerHTML = '';
      ACHIEVEMENTS.forEach(a => {
        const badge = document.createElement('div');
        badge.className = 'achievement-badge' + (achievementUnlocked[a.id] ? ' unlocked' : '');
        badge.id = 'badge-' + a.id;
        badge.title = a.desc;
        badge.textContent = `${a.icon} ${a.name}`;
        list.appendChild(badge);
      });
    }

    // 実績チェック（毎回呼ぶ）
    function checkAchievements() {
      ACHIEVEMENTS.forEach(a => {
        if (achievementUnlocked[a.id]) return;
        if (a.check()) {
          achievementUnlocked[a.id] = true;
          const badge = document.getElementById('badge-' + a.id);
          if (badge) badge.className = 'achievement-badge unlocked';
          toastQueue.push(a);
          showNextToast();
          autoSave();
        }
      });
    }

    // トースト表示（キューを順番に処理）
    function showNextToast() {
      if (toastShowing || toastQueue.length === 0) return;
      const a = toastQueue.shift();
      toastShowing = true;

      const toast = document.getElementById('achievement-toast');
      document.getElementById('toast-icon').textContent = a.icon;
      document.getElementById('toast-name').textContent = a.name;
      document.getElementById('toast-desc').textContent = a.desc;

      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => {
          toastShowing = false;
          showNextToast();
        }, 350);
      }, 3000);
    }

    // ============================================================
    // UI 生成
    // ============================================================

    function buildUpgradePanel() {
      const panel = document.getElementById('left-panel');
      UPGRADES.forEach(u => {
        const btn = document.createElement('button');
        btn.className = 'shop-btn';
        btn.id = 'btn-' + u.id;
        btn.innerHTML = `
          <span class="btn-icon">${u.icon}</span>
          <div class="btn-info">
            <span class="btn-name">${u.name}</span>
            <span class="btn-desc">クリック +$${u.power}</span>
          </div>
          <div class="btn-right">
            <span class="btn-cost">${formatMoney(u.cost)}</span>
          </div>
        `;
        btn.addEventListener('click', () => buyUpgrade(u));
        panel.appendChild(btn);
      });
    }

    function buildProducerPanel() {
      const panel = document.getElementById('right-panel');
      PRODUCERS.forEach(p => {
        const btn = document.createElement('button');
        btn.className = 'shop-btn';
        btn.id = 'btn-' + p.id;
        btn.innerHTML = `
          <span class="btn-icon">${p.icon}</span>
          <div class="btn-info">
            <span class="btn-name">${p.name}</span>
            <span class="btn-desc">+$${p.baseCps}/秒</span>
          </div>
          <div class="btn-right">
            <span class="btn-cost">${formatMoney(p.baseCost)}</span>
            <span class="btn-count">×0</span>
          </div>
        `;
        btn.addEventListener('click', () => buyProducer(p));
        panel.appendChild(btn);
      });
    }

    // ============================================================
    // 購入処理
    // ============================================================

    function buyUpgrade(u) {
      if (upgradePurchased[u.id] || score < u.cost) return;
      score -= u.cost;
      clickPower += u.power;
      upgradePurchased[u.id] = true;

      const btn = document.getElementById('btn-' + u.id);
      btn.querySelector('.btn-name').textContent += ' ✓';
      btn.classList.add('purchased');
      btn.disabled = true;

      document.getElementById('per-click').textContent = `1クリック = $${clickPower}`;
      updateScore();
      updateStats();
      updateAllButtons();
      checkAchievements();
      autoSave();
    }

    function buyProducer(p) {
      const cost = getProducerCost(p);
      if (score < cost) return;
      score -= cost;
      producerCount[p.id]++;
      totalProducers++;
      updateScore();
      updateCpsDisplay();
      updateStats();
      updateAllButtons();
      checkAchievements();
      autoSave();
    }

    // ============================================================
    // クリック処理
    // ============================================================

    document.getElementById('click-btn').addEventListener('click', (e) => {
      score += clickPower;
      totalClicks++;
      updateScore();
      updateStats();
      updateAllButtons();
      checkAchievements();
      spawnClickEffect(e.clientX, e.clientY, clickPower);
      autoSave();
    });

    // クリックエフェクト（+$N が飛び出す）
    function spawnClickEffect(x, y, value) {
      const el = document.createElement('div');
      el.className = 'click-effect';
      el.textContent = `+$${value}`;
      el.style.left = `${x - 15}px`;
      el.style.top  = `${y - 10}px`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    // ============================================================
    // 自動生産（50ms ごと）
    // ============================================================

    setInterval(() => {
      const cps = calcCps();
      if (cps === 0) return;
      score += cps / 20; // 1000ms / 50ms = 20
      updateScore();
      updateAllButtons();
    }, 50);

    // ============================================================
    // セーブ / ロード / リセット
    // ============================================================

    const SAVE_KEY = 'clickergame1_save';

    function saveGame(showNotice = true) {
      const data = {
        score,
        clickPower,
        totalClicks,
        totalProducers,
        upgradePurchased:    { ...upgradePurchased },
        producerCount:       { ...producerCount },
        achievementUnlocked: { ...achievementUnlocked },
      };
      localStorage.setItem(SAVE_KEY, JSON.stringify(data));
      if (showNotice) {
        const el = document.getElementById('save-notice');
        el.textContent = `セーブしました（${new Date().toLocaleTimeString('ja-JP')}）`;
        setTimeout(() => { el.textContent = ''; }, 3000);
      }
    }

    function loadGame() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;

      const data = JSON.parse(raw);
      score          = data.score          ?? 0;
      clickPower     = data.clickPower     ?? 1;
      totalClicks    = data.totalClicks    ?? 0;
      totalProducers = data.totalProducers ?? 0;

      // アップグレード復元
      if (data.upgradePurchased) {
        Object.assign(upgradePurchased, data.upgradePurchased);
        UPGRADES.forEach(u => {
          if (upgradePurchased[u.id]) {
            const btn = document.getElementById('btn-' + u.id);
            if (btn) {
              btn.querySelector('.btn-name').textContent += ' ✓';
              btn.classList.add('purchased');
              btn.disabled = true;
            }
          }
        });
      }

      // 生産者復元
      if (data.producerCount) {
        Object.assign(producerCount, data.producerCount);
      }

      // 実績復元（通知なし）
      if (data.achievementUnlocked) {
        Object.assign(achievementUnlocked, data.achievementUnlocked);
      }

      document.getElementById('per-click').textContent = `1クリック = $${clickPower}`;
      updateScore();
      updateCpsDisplay();
      updateStats();
      updateAllButtons();
    }

    // 操作ごとに自動セーブ
    function autoSave() { saveGame(false); }
    setInterval(() => saveGame(false), 30000);

    document.getElementById('save-btn').addEventListener('click', () => saveGame(true));

    document.getElementById('reset-btn').addEventListener('click', () => {
      if (!confirm('セーブデータを削除してリセットしますか？')) return;
      localStorage.removeItem(SAVE_KEY);
      location.reload();
    });

    // ============================================================
    // 初期化
    // ============================================================

    buildUpgradePanel();
    buildProducerPanel();
    loadGame();
    buildAchievementList(); // ロード後に実績バッジを描画
    updateCpsDisplay();
    updateAllButtons();
  </script>

</body>
</html>
